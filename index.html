<!-- The HTML of my program. -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">
    <!-- Top navigation / app bar. -->
    <header class="appbar">
      <div class="brand-block">
        <!-- Simple product mark for the top-left brand area. -->
        <div class="brand-mark" aria-hidden="true">AT</div>
        <div>
          <h1>Application Tracker</h1>
          <p class="subline">Track roles, deadlines, and pipeline progress.</p>
        </div>
      </div>

      <!-- Current top-right action. -->
      <div class="appbar-actions">
        <button id="clearBtn" class="btn btn-ghost">Reset</button>
      </div>
    </header>

    <!-- Summary numbers are updated dynamically via the back-end Javascript. -->
    <section class="summary-row" aria-label="Application summary">
      <article class="summary-card emphasis">
        <span>Total applications</span>
        <strong id="totalCount">0</strong>
      </article>
      <article class="summary-card">
        <span>Applied</span>
        <strong id="appliedCount">0</strong>
      </article>
      <article class="summary-card">
        <span>Interview</span>
        <strong id="interviewCount">0</strong>
      </article>
      <article class="summary-card">
        <span>Offers</span>
        <strong id="offerCount">0</strong>
      </article>
    </section>

    <!-- Main workspace: form on the left, tracked applications on the right. -->
    <main class="workspace">
      <aside class="panel composer-panel">
        <div class="section-head tight">
          <div>
            <h2>Add an application!</h2>
          </div>
        </div>

        <!-- Main application input form. -->
        <form id="applicationForm" class="application-form">
          <label>
            Company
            <input type="text" id="company" placeholder="Company Name Here" required />
          </label>

          <label>
            Role
            <input type="text" id="role" placeholder="Role Label Here" required />
          </label>

          <div class="two-col">
            <label>
              Status
              <select id="status" required>
                <option value="Applied">Applied</option>
                <option value="Online Assessment">Online Assessment</option>
                <option value="Interview">Interview</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
              </select>
            </label>

            <label>
              Deadline
              <input type="date" id="deadline" />
            </label>
          </div>

          <label>
            Location
            <input type="text" id="location" placeholder="e.g. Location / Remote" />
          </label>

          <label>
            Notes
            <textarea id="notes" rows="4" placeholder="Prep tasks, recruiter notes, links, reminders..."></textarea>
          </label>

          <button type="submit" class="btn btn-primary">Save application</button>
        </form>
      </aside>

      <section class="panel board-panel">
        <div class="section-head board-head">
          <div>
            <p class="section-label">Pipeline</p>
            <h2>Tracked applications</h2>
          </div>

          <!-- sr-only keeps the label accessible without displaying it. -->
          <div class="board-controls">
            <label class="filter-wrap">
              <span class="sr-only">Filter applications</span>
              <select id="filterStatus">
                <option value="All">All statuses</option>
                <option value="Applied">Applied</option>
                <option value="Online Assessment">Online Assessment</option>
                <option value="Interview">Interview</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
              </select>
            </label>
          </div>
        </div>

        <!-- Static row labels so the list feels more like a real tracker. -->
        <div class="list-chrome" aria-hidden="true">
          <span>Role</span>
          <span>Status</span>
          <span>Deadline</span>
        </div>

        <!-- When the first application is added, this is hidden. -->
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">+</div>
          <h3>No applications yet</h3>
          <p>Add your first role to start building the board.</p>
        </div>

        <!-- The application cards are inserted here via the back-end Javascript. -->
        <div id="applicationList" class="application-list"></div>
      </section>
    </main>
  </div>

  <!-- Loaded last so all DOM elements are available when executed. -->
  <script src="script.js"></script>
</body>
</html>
